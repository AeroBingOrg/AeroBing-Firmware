extends = common
platform = ststm32
framework = arduino
board = genericSTM32H723VG
board_build.mcu = stm32h723vgt6
board_build.f_cpu = 480000000L
board_build.ldscript = STM32H723VGTX_FLASH.ld
build_flags = 
	-DSKR_BOARD -DSKR_MINI_EZ
	-DSERIAL_UART_INSTANCE=3
	-DPIN_SERIAL_RX=PB11 -DPIN_SERIAL_TX=PB10
	-DTIMER_SERVO=TIM15
	-DSTEP_TIMER=TIM4
	-DSTEP_TIMER_CLEAR=TIM3
build_src_filter =
   +<*.h>
   +<main-${PIOENV}.cpp>
   +<test-${PIOENV}.cpp>

[env:ublox]
[env:shartlogger]
[env:sdfat]
[env:lsm6d]
[env:lis3mdl]
[env:bmp]

[env:lora]
platform = platformio/espressif32
framework = arduino
board = esp32dev

[env:serialbridge]